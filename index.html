<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Pookie Launcher | Rai Daim Pro</title>
<style>
    :root { --primary: #ff1493; --bg: #fdf2f5; --card: rgba(255, 255, 255, 0.4); --text: #444; --border: rgba(255, 255, 255, 0.6); }
    [data-theme="dark"] { --bg: #121212; --card: rgba(0, 0, 0, 0.6); --text: #eee; --border: rgba(255, 255, 255, 0.1); }
    body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; touch-action: none; transition: 0.5s ease; }
    
    @keyframes shake { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(-5px, 5px); } 50% { transform: translate(5px, -5px); } 75% { transform: translate(-5px, -5px); } }
    .shake-active { animation: shake 0.3s ease-in-out; }
    canvas { border-radius: 24px; box-shadow: 0 15px 50px rgba(0,0,0,0.2); background: #fff; }

    .overlay { position:absolute; width:360px; height:640px; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:24px; z-index: 10; background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--border); color: var(--text); }
    
    .coin-stats { background: rgba(255, 215, 0, 0.2); padding: 8px 15px; border-radius: 15px; border: 1px solid gold; margin-bottom: 15px; text-align: center; }
    .theme-switch { position: absolute; top: 20px; right: 20px; background: var(--primary); color: white; padding: 8px 15px; border-radius: 20px; font-size: 11px; font-weight: bold; border: none; cursor:pointer; }
    
    input { margin:8px 0; padding:12px; border-radius:15px; border: 1px solid var(--primary); width:70%; font-size:15px; outline: none; }
    .btn { background: var(--primary); color: white; border:none; padding:14px 45px; font-size:17px; font-weight:700; border-radius:50px; cursor:pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(255,20,147,0.3); }

    .char-container { display:flex; gap:8px; margin: 15px 0; flex-wrap: wrap; justify-content: center; width: 90%; }
    .char-box { width:50px; height:50px; border-radius:12px; background: rgba(255,255,255,0.3); cursor:pointer; display:flex; justify-content:center; align-items:center; border: 2px solid transparent; transition: 0.2s; }
    .char-box.selected { border-color: var(--primary); background: #fff; transform: scale(1.1); }
    
    #scoreboard { width: 80%; background: rgba(0,0,0,0.05); border-radius: 15px; margin-top: 15px; padding: 10px; font-size: 13px; }
    .score-entry { display: flex; justify-content: space-between; padding: 4px; border-bottom: 1px solid rgba(0,0,0,0.03); }

    #hud { position: absolute; top: 45px; width: 300px; display: none; justify-content: space-between; z-index: 5; pointer-events: none; }
    .stat-val { color: #fff; font-size: 38px; font-weight: 900; text-shadow: 2px 2px 0 var(--primary); }
</style>
</head>
<body>

<div id="hud">
    <div><div style="font-size:10px; color:#fff;">SCORE</div><div id="scoreDisplay" class="stat-val">0</div></div>
    <div style="text-align:right;"><div style="font-size:10px; color:#fff;">BEST</div><div id="highScoreDisplay" class="stat-val" style="color:#ffd700">0</div></div>
</div>

<div id="loginPage" class="overlay">
    <div class="title-text" style="font-size:40px; font-weight:900; color:var(--primary); margin-bottom:20px;">POOKIE</div>
    <input id="username" type="text" placeholder="Nickname">
    <button class="btn" onclick="login()">LOGIN</button>
</div>

<div id="startMenu" class="overlay" style="display:none;">
    <button class="theme-switch" onclick="toggleTheme()">THEME</button>
    
    <div class="coin-stats">
        <div style="font-size: 9px; font-weight: 800; color: #b8860b;">TOTAL COINS</div>
        <div id="totalCoinsMenu" style="font-size: 22px; font-weight: 900; color: #d4af37;">0</div>
    </div>

    <div style="font-size: 11px; font-weight: 800; color: var(--primary);">SELECT CHARACTER</div>
    <div class="char-container" id="charList"></div>
    
    <button class="btn" onclick="startGame()">PLAY GAME</button>
    
    <div id="scoreboard">
        <div style="text-align:center; font-weight:bold; margin-bottom:5px;">GLOBAL TOP 5</div>
        <div id="leaderboardList">Loading scores...</div>
    </div>

    <div onclick="logout()" style="color:#aaa; font-size:11px; cursor:pointer; margin-top:10px; text-decoration: underline;">Logout</div>
</div>

<canvas id="game"></canvas>

<audio id="audJump" src="https://files.catbox.moe/gdwkxz.mp3" preload="auto"></audio>
<audio id="audPoint" src="https://files.catbox.moe/vyrwbo.mp3" preload="auto"></audio>
<audio id="audHit" src="https://files.catbox.moe/tc5gl1.mp3" preload="auto"></audio>
<audio id="audScream" src="https://files.catbox.moe/tkzhsm.wav" preload="auto"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0oEauWFRHg-VoDFUHgka2Q7AbLOt6BPc",
  authDomain: "karbala-2fcca.firebaseapp.com",
  databaseURL: "https://karbala-2fcca-default-rtdb.firebaseio.com",
  projectId: "karbala-2fcca",
  storageBucket: "karbala-2fcca.firebasestorage.app",
  messagingSenderId: "407029541851",
  appId: "1:407029541851:web:068acb3c40e63b92af15fe"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Game Logic
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 360; canvas.height = 640;

const assets = {
    chars: [
        "https://i.ibb.co/4nZsqPZn/IMG-20260403-WA0258-removebg-preview.png",
        "https://i.ibb.co/KcbN4WFM/IMG-20260403-WA0256-removebg-preview.png",
        "https://i.ibb.co/zV9QR1R1/IMG-20260403-WA0257-removebg-preview.png",
        "https://i.ibb.co/3yQFCm0W/IMG-20260403-WA0259-removebg-preview.png",
        "https://i.ibb.co/XZT4pj5r/1775227244228-removebg-preview.png"
    ],
    bg: "https://i.ibb.co/PsXKrn2S/1775227599134.png",
    coin: "https://i.ibb.co/23YNrJty/1775130347248-removebg-preview.png",
    magnet: "https://cdn-icons-png.flaticon.com/512/1042/1042390.png"
};

const sounds = { jump: document.getElementById('audJump'), point: document.getElementById('audPoint'), hit: document.getElementById('audHit'), scream: document.getElementById('audScream') };

let birdImg = new Image(); birdImg.src = assets.chars[0];
let bgImg = new Image(); bgImg.src = assets.bg;
let coinImg = new Image(); coinImg.src = assets.coin;
let magnetImg = new Image(); magnetImg.src = assets.magnet;

let state = {
    active: false, dead: false, score: 0, coinsInRun: 0, frame: 0, bgX: 0, speed: 3.2,
    bird: { x: 85, y: 320, w: 55, h: 55, v: 0, g: 0.27, jump: -6 },
    pipes: [], coins: [], magnets: [], magnetActive: 0, theme: 'light'
};

window.login = function() { 
    const name = document.getElementById('username').value.trim();
    if(name.length > 1) { 
        localStorage.setItem('pookie_user', name); 
        showMenu(); 
    } 
};

window.logout = function() { localStorage.removeItem('pookie_user'); location.reload(); };

window.showMenu = function() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('startMenu').style.display = 'flex';
    document.getElementById('totalCoinsMenu').innerText = localStorage.getItem('pookie_total_coins') || 0;
    document.getElementById('highScoreDisplay').innerText = localStorage.getItem('pookie_high') || 0;
    syncGlobalLeaderboard();
};

window.startGame = function() { 
    document.getElementById('startMenu').style.display = 'none'; 
    document.getElementById('hud').style.display = 'flex'; 
    reset(); 
    state.active = true; 
    loop(); 
};

window.toggleTheme = function() { 
    state.theme = state.theme === 'light' ? 'dark' : 'light'; 
    document.body.setAttribute('data-theme', state.theme); 
};

function selectChar(i, el) {
    birdImg.src = assets.chars[i];
    document.querySelectorAll('.char-box').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected'); play('jump');
}

function play(key) { const s = sounds[key]; if(s) { s.currentTime = 0; s.play().catch(()=>{}); } }

function reset() {
    state.bird.y = 320; state.bird.v = 0; state.score = 0; state.coinsInRun = 0; state.speed = 3.2;
    state.pipes = []; state.coins = []; state.magnets = []; state.magnetActive = 0; state.dead = false; state.frame = 0;
    document.getElementById('scoreDisplay').innerText = "0";
}

function syncGlobalLeaderboard() {
    const lbRef = query(ref(db, 'leaderboard'), orderByChild('score'), limitToLast(5));
    onValue(lbRef, (snap) => {
        const data = snap.val();
        if (data) {
            let sorted = Object.values(data).sort((a,b) => b.score - a.score);
            document.getElementById('leaderboardList').innerHTML = sorted.map((s, i) => 
                `<div class="score-entry"><span>${i+1}. ${s.name}</span><span>${s.score}</span></div>`
            ).join('');
        }
    });
}

function updateFirebaseScore(name, score) {
    const scoreRef = ref(db, 'leaderboard/' + name.replace(/[.#$/[\]]/g, "_"));
    onValue(scoreRef, (snap) => {
        const val = snap.val();
        if (!val || score > val.score) {
            set(scoreRef, { name: name, score: score });
        }
    }, { onlyOnce: true });
}

function triggerDie() {
    if(state.dead) return; state.dead = true; 
    if (navigator.vibrate) navigator.vibrate([150, 50, 150]); 
    canvas.classList.add('shake-active'); play('hit'); setTimeout(() => play('scream'), 250);
    
    let user = localStorage.getItem('pookie_user');
    let total = parseInt(localStorage.getItem('pookie_total_coins') || 0);
    localStorage.setItem('pookie_total_coins', total + state.coinsInRun);
    
    let high = parseInt(localStorage.getItem('pookie_high') || 0);
    if(state.score > high) localStorage.setItem('pookie_high', state.score);

    updateFirebaseScore(user, state.score);

    setTimeout(() => { 
        state.active = false; 
        showMenu(); 
        document.getElementById('hud').style.display = 'none'; 
        canvas.classList.remove('shake-active'); 
    }, 1600);
}

function spawn() {
    const h = Math.random() * (canvas.height - 400) + 100;
    state.pipes.push({ x: canvas.width, y: h, w: 75, gap: 195, passed: false });
    state.coins.push({ x: canvas.width + 120, y: h + 195/2, w: 35, collected: false });
    if(state.frame % 450 === 0 && state.frame > 0) state.magnets.push({ x: canvas.width + 200, y: Math.random()*400+100, w: 40, collected: false });
}

function loop() {
    if(!state.active) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    state.bgX -= state.speed * 0.4; if(state.bgX <= -canvas.width) state.bgX = 0;
    ctx.drawImage(bgImg, state.bgX, 0, canvas.width, canvas.height);
    ctx.drawImage(bgImg, state.bgX + canvas.width, 0, canvas.width, canvas.height);

    if(!state.dead) {
        state.bird.v += state.bird.g; state.bird.y += state.bird.v;
        if(state.frame % 90 === 0) spawn();
        if(state.magnetActive > 0) state.magnetActive--;
    }

    state.magnets.forEach(m => {
        m.x -= state.speed;
        if(!m.collected) {
            ctx.drawImage(magnetImg, m.x-20, m.y-20, 40, 40);
            if(Math.hypot(state.bird.x - m.x, state.bird.y - m.y) < 45) { m.collected = true; state.magnetActive = 400; play('point'); }
        }
    });

    state.pipes.forEach(p => {
        p.x -= state.speed; ctx.fillStyle = "#2ecc71"; ctx.fillRect(p.x, 0, p.w, p.y); ctx.fillRect(p.x, p.y + 195, p.w, canvas.height);
        if(!state.dead && state.bird.x+18 > p.x && state.bird.x-18 < p.x+p.w) { if(state.bird.y-18 < p.y || state.bird.y+18 > p.y+195) triggerDie(); }
        if(!p.passed && p.x + p.w < state.bird.x) { p.passed = true; state.score++; document.getElementById('scoreDisplay').innerText = state.score; play('point'); }
    });

    state.coins.forEach(c => {
        c.x -= state.speed;
        if(!c.collected) {
            if(state.magnetActive > 0 && Math.hypot(state.bird.x - c.x, state.bird.y - c.y) < 200) { c.x += (state.bird.x - c.x)*0.15; c.y += (state.bird.y - c.y)*0.15; }
            ctx.drawImage(coinImg, c.x-17, c.y-17, 35, 35);
            if(Math.hypot(state.bird.x - c.x, state.bird.y - c.y) < 38) { c.collected = true; state.coinsInRun += 5; play('point'); }
        }
    });

    if(state.magnetActive > 0) { ctx.strokeStyle = "rgba(255,20,147,0.5)"; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(state.bird.x, state.bird.y, 45, 0, Math.PI*2); ctx.stroke(); }

    ctx.save(); ctx.translate(state.bird.x, state.bird.y); ctx.rotate(Math.min(Math.PI/4, Math.max(-Math.PI/4, state.bird.v * 0.1)));
    ctx.drawImage(birdImg, -state.bird.w/2, -state.bird.h/2, state.bird.w, state.bird.h); ctx.restore();

    if(!state.dead && (state.bird.y > canvas.height || state.bird.y < 0)) triggerDie();
    state.frame++; requestAnimationFrame(loop);
}

function jump() { if(state.active && !state.dead) { state.bird.v = state.bird.jump; play('jump'); } }

canvas.addEventListener('touchstart', e => { jump(); e.preventDefault(); }, {passive: false});
window.addEventListener('mousedown', () => { if(state.active) jump(); });

// Initialization
const charListDiv = document.getElementById('charList');
assets.chars.forEach((src, i) => {
    const box = document.createElement('div');
    box.className = `char-box ${i===0?'selected':''}`;
    box.onclick = () => selectChar(i, box);
    box.innerHTML = `<img src="${src}" width="35">`;
    charListDiv.appendChild(box);
});

if (localStorage.getItem('pookie_user')) showMenu();

</script>
</body>
</html>
