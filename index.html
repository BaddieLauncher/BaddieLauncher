<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Pookie Launcher | Rai Daim Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
    :root { --primary: #ff1493; --card: rgba(255, 255, 255, 0.98); --shadow: 0 10px 30px rgba(0,0,0,0.1); }
    body { margin:0; font-family: 'Poppins', sans-serif; background: #f0f2f5; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
    #game-container { position: relative; width: 360px; height: 640px; background: #fff; border-radius: 30px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15); border: 4px solid white; }
    canvas { position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 5; }
    .overlay { position:absolute; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index: 50; background: var(--card); backdrop-filter: blur(10px); text-align: center; }
    input { margin:10px 0; padding:14px; border-radius:15px; border: 2px solid #eee; width:75%; outline: none; text-align: center; font-family: 'Poppins'; }
    .btn { background: var(--primary); color: white; border:none; padding:14px 30px; font-weight:600; border-radius:18px; cursor:pointer; font-size:14px; margin-top: 10px; width: 80%; text-transform: uppercase; box-shadow: 0 4px 15px rgba(255, 20, 147, 0.3); transition: 0.2s; }
    .btn:active { transform: scale(0.95); }
    #hud { position: absolute; top: 25px; width: 100%; display: none; justify-content: space-between; z-index: 20; padding: 0 20px; box-sizing: border-box; }
    .stat-pill { background: rgba(255,255,255,0.9); padding: 5px 15px; border-radius: 20px; font-weight: 800; box-shadow: var(--shadow); }
    #chat-box { position: absolute; bottom: 85px; right: 15px; width: 260px; height: 300px; background: #fff; border-radius: 20px; display: none; flex-direction: column; z-index: 70; box-shadow: var(--shadow); border: 1px solid #eee; overflow: hidden; }
    #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; font-size: 12px; text-align: left; }
    .fab { width: 50px; height: 50px; border-radius: 15px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--shadow); position: absolute; z-index: 60; }
    #muteBtn { bottom: 20px; left: 20px; background: #eee; }
    #chatToggle { bottom: 20px; right: 20px; background: var(--primary); color: white; }
    #adminPanel { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:300px; background: white; padding: 25px; border-radius: 25px; z-index: 200; box-shadow: 0 0 100px rgba(0,0,0,0.5); border: 2px solid var(--primary); }
</style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div class="stat-pill" style="color: var(--primary);">Pts: <span id="scoreDisplay">0</span></div>
        <div class="stat-pill" style="color: #ffa500;">🪙 <span id="coinDisplay">0</span></div>
    </div>
    <canvas id="game"></canvas>

    <div id="loginPage" class="overlay">
        <h1 style="color:var(--primary); margin-bottom:5px;">POOKIE</h1>
        <input id="uIn" type="text" placeholder="Your Nickname">
        <button class="btn" onclick="login()">Enter Arena</button>
    </div>

    <div id="startMenu" class="overlay" style="display:none;">
        <div id="adminBtn" onclick="tryOpenAdmin()" style="display:none; position:absolute; top:20px; left:20px; cursor:pointer; font-size: 24px;">⚙️</div>
        <div onclick="logout()" style="position:absolute; top:25px; right:20px; color:#999; cursor:pointer; font-size:10px; font-weight:800;">LOGOUT</div>
        <h2 style="margin:0; font-size: 22px; color: #e67e22;">🪙 <span id="totalCoinsDisplay">0</span></h2>
        <div style="display:flex; align-items:center; gap:15px; margin: 15px 0;">
            <button onclick="changeChar(-1)" style="font-size:24px; background:none; border:none; cursor:pointer;">◀</button>
            <img id="charAvatar" src="" style="width:95px; height:95px; border-radius:25px; background:#fff; border: 3px solid var(--primary); box-shadow: var(--shadow);">
            <button onclick="changeChar(1)" style="font-size:24px; background:none; border:none; cursor:pointer;">▶</button>
        </div>
        <button class="btn" onclick="startGame(false)">Solo Play</button>
        <button class="btn" onclick="openMultiMenu()" style="background:#3498db">Multiplayer</button>
        
        <div id="leaderboardList" style="width:85%; background:#fafafa; border-radius:15px; margin-top:15px; padding: 10px 0; border: 1px solid #eee;">
            <div style="font-size:10px; font-weight:800; padding:0 0 5px 0; color:#999;">RANKING</div>
            <div id="lbItems"></div>
        </div>
    </div>

    <div id="multiMenu" class="overlay" style="display:none;">
        <h3>Multiplayer Mode</h3>
        <input id="roomIn" type="text" placeholder="Enter Room Code">
        <button class="btn" onclick="joinRoomAction()" style="background:#2ecc71">Join Room</button>
        <button class="btn" onclick="createRoomAction()" style="background:#f39c12">Create Room</button>
        <button class="btn" onclick="showMenu()" style="background:#ccc">Back</button>
    </div>

    <div id="roomLobby" class="overlay" style="display:none;">
        <p style="margin:0; color:#999;">Room Code</p>
        <h1 id="displayRoomCode" style="color:var(--primary); font-size:45px; margin:0;">0000</h1>
        <p id="playerCount" style="font-weight:bold; color:#555;">Waiting...</p>
        <button class="btn" id="startBtn" onclick="hostStartGame()" style="background:#2ecc71; display:none;">START MATCH</button>
        <button class="btn" onclick="shareWA()" style="background:#25D366; font-size:12px;">WhatsApp Share</button>
        <button class="btn" onclick="leaveRoom()" style="background:#eee; color:#333; margin-top:20px;">Leave</button>
    </div>

    <div id="chat-box">
        <div style="padding:10px; background:var(--primary); color:white; font-weight:800; font-size:14px;">Global Chat</div>
        <div id="chat-msgs"></div>
        <div style="display:flex; padding:10px; border-top:1px solid #eee;">
            <input id="cIn" style="flex:1; margin:0; padding:8px; border-radius:10px; font-size:12px;" placeholder="Type message...">
            <button onclick="sendMsg()" style="border:none; background:none; font-size:20px; cursor:pointer; margin-left:5px;">🚀</button>
        </div>
    </div>

    <button id="chatToggle" class="fab" onclick="toggleChat()">💬</button>
    <button id="muteBtn" class="fab" onclick="toggleMute()">🔊</button>
</div>

<div id="adminPanel">
    <h3 style="text-align:center; margin-top:0;">👑 MASTER PANEL</h3>
    <input id="adminMsgIn" type="text" placeholder="Message...">
    <button class="btn" onclick="pushGlobalAlert()" style="background:red;">Push Alert</button>
    <button class="btn" onclick="closeAdmin()" style="background:#333;">Close</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, push, get, query, orderByChild, limitToLast, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const conf = { apiKey: "AIzaSyA0oEauWFRHg-VoDFUHgka2Q7AbLOt6BPc", databaseURL: "https://karbala-2fcca-default-rtdb.firebaseio.com" };
const app = initializeApp(conf); const db = getDatabase(app);
const canvas = document.getElementById('game'); const ctx = canvas.getContext('2d');
canvas.width = 360; canvas.height = 640;

const bgMusic = new Audio('https://files.catbox.moe/yjeo65.mp3'); bgMusic.loop = true;
const coinSnd = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');

let currentRoom = null; let isHost = false; let isMultiplayer = false; let isMuted = false;
const assets = { 
    chars: ["https://i.ibb.co/4nZsqPZn/IMG-20260403-WA0258-removebg-preview.png","https://i.ibb.co/KcbN4WFM/IMG-20260403-WA0256-removebg-preview.png","https://i.ibb.co/zV9QR1R1/IMG-20260403-WA0257-removebg-preview.png","https://i.ibb.co/3yQFCm0W/IMG-20260403-WA0259-removebg-preview.png","https://i.ibb.co/XZT4pj5r/1775227244228-removebg-preview.png"], 
    bg: "https://i.ibb.co/PsXKrn2S/1775227599134.png", coin: "https://i.ibb.co/23YNrJty/1775130347248-removebg-preview.png" 
};

let birdImg = new Image(); let bgImg = new Image(); bgImg.src = assets.bg; let coinImg = new Image(); coinImg.src = assets.coin;
let st = { active: false, dead: false, score: 0, frame: 0, bX: 0, bird: { x: 80, y: 300, v: 0, g: 0.25 }, pipes: [], gameCoins: [], charIndex: 0 };

const MY_NAME = "Rai Daim";
const ADMIN_PASS = "22002200";

window.login = () => { 
    const n = document.getElementById('uIn').value.trim(); 
    if(n.length>1){localStorage.setItem('pUser',n); showMenu();} 
};
window.logout = () => { localStorage.removeItem('pUser'); location.reload(); };

window.showMenu = () => {
    document.querySelectorAll('.overlay').forEach(p => p.style.display = 'none');
    document.getElementById('startMenu').style.display = 'flex';
    document.getElementById('hud').style.display = 'none';
    const user = localStorage.getItem('pUser') || "";
    const uKey = user.replace(/\W/g,'');
    if(user === MY_NAME) document.getElementById('adminBtn').style.display = 'block';
    
    onValue(ref(db, `users/${uKey}/coins`), s => {
        const c = s.val() || 0;
        document.getElementById('totalCoinsDisplay').innerText = c;
        document.getElementById('coinDisplay').innerText = c;
    });
    syncLB(); updateCharUI();
};

// Admin Logic
window.tryOpenAdmin = () => { if(prompt("Passkey:") === ADMIN_PASS) document.getElementById('adminPanel').style.display = 'block'; };
window.closeAdmin = () => document.getElementById('adminPanel').style.display = 'none';

// Scoreboard Logic (FIXED)
function syncLB() {
    const lbRef = query(ref(db, 'users'), orderByChild('coins'), limitToLast(5));
    onValue(lbRef, s => {
        let arr = [];
        s.forEach(child => { arr.push({ name: child.key, coins: child.val().coins || 0 }); });
        arr.sort((a, b) => b.coins - a.coins);
        
        const list = document.getElementById('lbItems');
        list.innerHTML = '';
        arr.forEach((p, index) => {
            list.innerHTML += `
                <div style="display:flex; justify-content:space-between; padding:4px 20px; font-size:12px; font-weight:600; color:#444;">
                    <span>${index + 1}. ${p.name}</span>
                    <span style="color:var(--primary);">🪙 ${p.coins}</span>
                </div>`;
        });
    });
}

// Game Loop, Chat & Multiplayer (Restoring standard logic)
window.toggleChat = () => { const box = document.getElementById('chat-box'); box.style.display = (box.style.display === 'flex') ? 'none' : 'flex'; };
window.sendMsg = () => { const i = document.getElementById('cIn'); if(i.value.trim()){ push(ref(db, 'globalChat'), { u: localStorage.getItem('pUser'), m: i.value }); i.value = ''; } };
onValue(query(ref(db, 'globalChat'), limitToLast(10)), s => {
    const l = document.getElementById('chat-msgs'); l.innerHTML = '';
    s.forEach(x => { const d = x.val(); l.innerHTML += `<div style="margin-bottom:5px;"><b>${d.u}:</b> ${d.m}</div>`; });
    l.scrollTop = l.scrollHeight;
});

window.openMultiMenu = () => { document.getElementById('startMenu').style.display='none'; document.getElementById('multiMenu').style.display='flex'; };
window.createRoomAction = () => { isHost = true; joinRoom(Math.floor(1000 + Math.random() * 9000)); };
window.joinRoomAction = () => { const c = document.getElementById('roomIn').value; if(c){isHost=false; joinRoom(c);} };
function joinRoom(code) {
    currentRoom = code;
    document.querySelectorAll('.overlay').forEach(p => p.style.display = 'none');
    document.getElementById('roomLobby').style.display = 'flex';
    document.getElementById('displayRoomCode').innerText = code;
    document.getElementById('startBtn').style.display = isHost ? 'block' : 'none';
    onValue(ref(db, `rooms/${code}/status`), s => { if(s.val() === "playing") startGame(true); });
}
window.hostStartGame = () => { set(ref(db, `rooms/${currentRoom}/status`), "playing"); };
window.shareWA = () => { window.open(`https://wa.me/?text=Join+my+Pookie+Launcher+Arena!+Code:+${currentRoom}`, '_blank'); };
window.leaveRoom = () => { showMenu(); };

window.startGame = (multi) => {
    isMultiplayer = multi;
    document.querySelectorAll('.overlay').forEach(p => p.style.display = 'none');
    document.getElementById('hud').style.display = 'flex';
    birdImg.src = assets.chars[st.charIndex];
    st = { ...st, active: true, dead: false, score: 0, frame: 0, pipes: [], gameCoins: [], bird: { x: 80, y: 300, v: 0, g: 0.25 } };
    loop();
};

function loop() {
    if(!st.active) return;
    ctx.clearRect(0,0,360,640);
    st.bX -= 1.5; ctx.drawImage(bgImg, st.bX, 0, 360, 640); ctx.drawImage(bgImg, st.bX+360, 0, 360, 640); if(st.bX<=-360) st.bX=0;
    if(!st.dead) {
        st.bird.v += st.bird.g; st.bird.y += st.bird.v;
        if(st.frame % 100 === 0) {
            let py = Math.random() * 250 + 100;
            st.pipes.push({ x: 360, y: py, passed: false });
            if(Math.random() > 0.6) st.gameCoins.push({ x: 380, y: py + 80, collected: false });
        }
    }
    st.gameCoins.forEach(c => {
        if(!st.dead) c.x -= 2.5;
        if(!c.collected) {
            ctx.drawImage(coinImg, c.x, c.y, 30, 30);
            if(Math.hypot(st.bird.x-(c.x+15), st.bird.y-(c.y+15)) < 30) { c.collected=true; addCoin(); if(!isMuted) coinSnd.play(); }
        }
    });
    st.pipes.forEach(p => {
        if(!st.dead) p.x -= 2.5;
        ctx.fillStyle = "#2ecc71"; ctx.fillRect(p.x, 0, 52, p.y); ctx.fillRect(p.x, p.y + 180, 52, 640);
        if(!st.dead && st.bird.x+15 > p.x && st.bird.x-15 < p.x+52 && (st.bird.y-15 < p.y || st.bird.y+15 > p.y+180)) die();
        if(!p.passed && p.x < st.bird.x) { p.passed=true; st.score++; document.getElementById('scoreDisplay').innerText = st.score; }
    });
    ctx.drawImage(birdImg, st.bird.x-25, st.bird.y-25, 50, 50);
    if(!st.dead && (st.bird.y > 640 || st.bird.y < 0)) die();
    if(!st.dead) st.frame++;
    requestAnimationFrame(loop);
}
function die() { st.dead = true; setTimeout(() => { st.active = false; showMenu(); }, 1200); }
function addCoin() {
    const uKey = (localStorage.getItem('pUser')||"").replace(/\W/g,'');
    get(ref(db, `users/${uKey}/coins`)).then(s => { set(ref(db, `users/${uKey}/coins`), (s.val()||0)+5); });
}

window.changeChar = (dir) => { st.charIndex = (st.charIndex + dir + assets.chars.length) % assets.chars.length; updateCharUI(); };
function updateCharUI() { document.getElementById('charAvatar').src = assets.chars[st.charIndex]; }
window.toggleMute = () => { isMuted = !isMuted; bgMusic.muted = isMuted; if(isMuted) bgMusic.pause(); else bgMusic.play().catch(()=>{}); document.getElementById('muteBtn').innerText = isMuted ? '🔇' : '🔊'; };
const jump = () => { if(st.active && !st.dead) st.bird.v = -5.5; };
window.addEventListener('mousedown', (e) => { if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') jump(); });
window.addEventListener('touchstart', (e) => { if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') jump(); });
if(localStorage.getItem('pUser')) showMenu();
</script>
</body>
</html>
